{%load crispy_forms_tags%}

{%block title%}Log In{%endblock title%}

{%block content%}
<h2>Log in</h2>
<form method="post">{%csrf_token%}
    {{form | crispy}}
    <button type="submit" class="btn btn-success ml-2">Log In</button>
    <p></p>
    <p><a href="{%url 'password_reset' %}">Forgot your password?</a></p>
</form>
{%endblock content%}
